---
layout: default
title: "Laktózmentes Receptek"
---

<section class="py-12">
    <div class="text-center mb-12">
        <h1 class="text-4xl font-extrabold text-gray-900 mb-4">Receptek</h1>
        <p class="text-lg text-gray-600 font-light">Válogass laktózmentes finomságaink közül.</p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
        {% for recipe in site.recipes %}
        <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden hover:shadow-md transition-shadow">
            <div class="p-6">
                <h2 class="text-xl font-bold text-green-700 mb-2">{{ recipe.title }}</h2>
                <p class="text-gray-500 text-sm mb-4">{{ recipe.excerpt | strip_html | truncate: 120 }}</p>
                <a href="{{ recipe.url }}" class="inline-block bg-green-600 text-white px-4 py-2 rounded-lg text-sm font-semibold hover:bg-green-700 transition-colors">
                    Megnézem a receptet
                </a>
            </div>
        </div>
        {% endfor %}
    </div>
</section>
